<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>売上管理</title>
  <script src="config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', 'Yu Gothic', sans-serif;
      background: #f0f7f3;
      min-height: 100vh;
      padding-bottom: 40px;
    }
    .page-header {
      background: #27ae60;
      color: white;
      padding: 14px 20px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    .page-header h1 { font-size: 17px; font-weight: bold; }
    .page-header .store { font-size: 12px; opacity: 0.8; margin-top: 2px; }

    .content { padding: 16px; max-width: 480px; margin: 0 auto; }

    .month-card {
      background: linear-gradient(135deg, #27ae60, #1e8449);
      color: white;
      border-radius: 16px;
      padding: 24px 20px;
      margin-bottom: 14px;
      box-shadow: 0 4px 14px rgba(39,174,96,0.35);
    }
    .month-label { font-size: 13px; opacity: 0.85; margin-bottom: 6px; }
    .month-amount { font-size: 38px; font-weight: bold; letter-spacing: -1px; }
    .month-amount .unit { font-size: 18px; font-weight: normal; margin-left: 2px; }
    .month-sub { font-size: 12px; opacity: 0.75; margin-top: 8px; }

    .card {
      background: white;
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.06);
    }
    .card-title { font-size: 12px; color: #8a9a8a; font-weight: bold; margin-bottom: 12px; letter-spacing: 0.5px; }

    .today-row { display: flex; align-items: center; justify-content: space-between; }
    .today-date { font-size: 15px; font-weight: bold; color: #1a2a1a; }
    .today-badge { font-size: 12px; font-weight: bold; padding: 4px 10px; border-radius: 20px; }
    .badge-ok { background: #e8f8ee; color: #27ae60; }
    .badge-ng { background: #fff3f3; color: #e74c3c; }
    .today-amount { font-size: 24px; font-weight: bold; color: #27ae60; margin-top: 8px; }
    .today-meta { font-size: 12px; color: #aaa; margin-top: 4px; }

    .week-wrap { display: flex; align-items: flex-end; gap: 5px; height: 64px; }
    .week-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .week-bar { width: 100%; border-radius: 4px 4px 0 0; background: #c8ebd6; min-height: 4px; }
    .week-bar.today { background: #27ae60; }
    .week-bar.zero { background: #e8e8e8; }
    .week-day { font-size: 10px; color: #bbb; }
    .week-day.today-label { color: #27ae60; font-weight: bold; }

    .stat-row { display: flex; gap: 8px; }
    .stat-item { flex: 1; text-align: center; padding: 10px 4px; background: #f8fdf9; border-radius: 10px; }
    .stat-val { font-size: 17px; font-weight: bold; color: #27ae60; }
    .stat-label { font-size: 10px; color: #aaa; margin-top: 3px; }

    .btn-primary {
      display: block; width: 100%; padding: 16px;
      background: #27ae60; color: white; border: none;
      border-radius: 14px; font-size: 16px; font-weight: bold;
      font-family: inherit; cursor: pointer; text-align: center;
      text-decoration: none; margin-bottom: 10px;
      box-shadow: 0 4px 12px rgba(39,174,96,0.3);
    }
    .btn-secondary {
      display: block; width: 100%; padding: 14px;
      background: white; color: #27ae60;
      border: 2px solid #27ae60; border-radius: 14px;
      font-size: 15px; font-weight: bold; font-family: inherit;
      cursor: pointer; text-align: center; text-decoration: none;
    }
    .loading { color: #bbb; font-size: 14px; }
  </style>
</head>
<body>
  <div class="page-header">
    <h1>📊 売上管理</h1>
    <div class="store" id="store-name"></div>
  </div>

  <div class="content">
    <div class="month-card">
      <div class="month-label" id="month-label">今月の売上</div>
      <div class="month-amount"><span id="month-amount" class="loading">—</span><span class="unit">円</span></div>
      <div class="month-sub" id="month-sub">読み込み中...</div>
    </div>

    <div class="card">
      <div class="card-title">TODAY</div>
      <div class="today-row">
        <div class="today-date" id="today-date"></div>
        <span class="today-badge" id="today-badge">—</span>
      </div>
      <div class="today-amount" id="today-amount"></div>
      <div class="today-meta" id="today-meta"></div>
    </div>

    <div class="card">
      <div class="card-title">直近7日間の推移</div>
      <div class="week-wrap" id="week-bars"></div>
    </div>

    <div class="card">
      <div class="card-title">今月の集計</div>
      <div class="stat-row">
        <div class="stat-item">
          <div class="stat-val" id="stat-days">—</div>
          <div class="stat-label">記録日数</div>
        </div>
        <div class="stat-item">
          <div class="stat-val" id="stat-customers">—</div>
          <div class="stat-label">累計客数</div>
        </div>
        <div class="stat-item">
          <div class="stat-val" id="stat-avg">—</div>
          <div class="stat-label">平均客単価</div>
        </div>
      </div>
    </div>

    <a href="input.html" class="btn-primary">＋ 今日の売上を記録する</a>
    <a href="history.html" class="btn-secondary">過去の記録・CSV出力</a>
  </div>

  <script>
    document.getElementById('store-name').textContent = STORE_NAME;
    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const today = new Date();
    const todayStr = today.toISOString().split('T')[0];
    const y = today.getFullYear(), m = today.getMonth() + 1;
    const monthStart = `${y}-${String(m).padStart(2,'0')}-01`;
    const days = ['日','月','火','水','木','金','土'];

    document.getElementById('today-date').textContent = `${m}月${today.getDate()}日（${days[today.getDay()]}）`;
    document.getElementById('month-label').textContent = `${y}年${m}月の売上`;

    function fmt(n) { return n.toLocaleString(); }

    async function load() {
      const { data: monthData } = await db.from('sales')
        .select('*')
        .eq('store_name', STORE_NAME)
        .gte('sale_date', monthStart)
        .lte('sale_date', todayStr)
        .order('sale_date', { ascending: false });

      const records = monthData || [];
      const totalSales = records.reduce((s, r) => s + (r.total_taxin || 0), 0);
      const totalCust = records.reduce((s, r) => s + (r.customers || 0), 0);

      document.getElementById('month-amount').textContent = fmt(totalSales);
      document.getElementById('month-sub').textContent = `${records.length}日分の記録 ／ 累計 ${totalCust}名`;
      document.getElementById('stat-days').textContent = `${records.length}日`;
      document.getElementById('stat-customers').textContent = `${totalCust}名`;
      const avg = totalCust > 0 ? Math.round(totalSales / totalCust) : 0;
      document.getElementById('stat-avg').textContent = avg > 0 ? `¥${fmt(avg)}` : '—';

      const todayRec = records.find(r => r.sale_date === todayStr);
      if (todayRec) {
        document.getElementById('today-badge').textContent = '記録済み ✓';
        document.getElementById('today-badge').className = 'today-badge badge-ok';
        document.getElementById('today-amount').textContent = `¥${fmt(todayRec.total_taxin)}`;
        document.getElementById('today-meta').textContent = `客数: ${todayRec.customers || 0}名 ／ ${todayRec.memo ? todayRec.memo.slice(0,20) : ''}`;
      } else {
        document.getElementById('today-badge').textContent = '未記録';
        document.getElementById('today-badge').className = 'today-badge badge-ng';
        document.getElementById('today-amount').textContent = '';
        document.getElementById('today-meta').textContent = '今日の売上をまだ記録していません';
      }

      // 直近7日間
      const sevenAgo = new Date(today);
      sevenAgo.setDate(today.getDate() - 6);
      const sevenStr = sevenAgo.toISOString().split('T')[0];
      const { data: weekData } = await db.from('sales')
        .select('sale_date, total_taxin')
        .eq('store_name', STORE_NAME)
        .gte('sale_date', sevenStr)
        .lte('sale_date', todayStr);

      const weekMap = {};
      (weekData || []).forEach(r => { weekMap[r.sale_date] = r.total_taxin; });
      const maxVal = Math.max(...Object.values(weekMap).filter(v => v > 0), 1);

      const barsEl = document.getElementById('week-bars');
      barsEl.innerHTML = '';
      for (let i = 6; i >= 0; i--) {
        const d = new Date(today);
        d.setDate(today.getDate() - i);
        const dStr = d.toISOString().split('T')[0];
        const val = weekMap[dStr] || 0;
        const isToday = dStr === todayStr;
        const ratio = val > 0 ? val / maxVal : 0;

        const col = document.createElement('div');
        col.className = 'week-col';
        col.innerHTML = `
          <div class="week-bar ${isToday ? 'today' : ''} ${val === 0 ? 'zero' : ''}" style="height:${Math.max(ratio * 50, 4)}px"></div>
          <div class="week-day ${isToday ? 'today-label' : ''}">${days[d.getDay()]}</div>
        `;
        barsEl.appendChild(col);
      }
    }

    load();
  </script>
</body>
</html>
